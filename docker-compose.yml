services:
  database:
    image: mysql:8.4
    container_name: marks-ranking-system-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-marks_ranking_system}"
      MYSQL_USER: "${DB_USERNAME:-marks_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      timeout: 5s
      retries: 10
      interval: 10s

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: marks-ranking-system-phpmyadmin
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_USER: "${DB_USERNAME:-marks_user}"
      PMA_PASSWORD: "${DB_PASSWORD:-secret}"

volumes:
  mysql-data:
