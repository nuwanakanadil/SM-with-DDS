---
deployment:
  tasks:
    - export APPPATH=/home/supetzvd/sm-with-dds
    - export PUBLICPATH=/home/supetzvd/public_html

    # Clean and copy latest frontend build to public_html
    - /bin/rm -rf $PUBLICPATH/build
    - /bin/cp -a $APPPATH/public/build $PUBLICPATH/build

    # Copy other public assets, but do not overwrite public_html/index.php
    - /bin/cp -a $APPPATH/public/images $PUBLICPATH/images || true
    - /bin/cp $APPPATH/public/.htaccess $PUBLICPATH/.htaccess
    - /bin/cp $APPPATH/public/favicon.ico $PUBLICPATH/favicon.ico || true
    - /bin/cp $APPPATH/public/robots.txt $PUBLICPATH/robots.txt || true

    # Remove Vite dev hot files if accidentally present
    - /bin/rm -f $APPPATH/public/hot
    - /bin/rm -f $PUBLICPATH/hot

    # Laravel production commands
    - cd $APPPATH && php artisan config:clear
    - cd $APPPATH && php artisan cache:clear
    - cd $APPPATH && php artisan route:clear
    - cd $APPPATH && php artisan view:clear
    - cd $APPPATH && php artisan migrate --force
    - cd $APPPATH && php artisan permissions:sync
    - cd $APPPATH && php artisan config:cache
    - cd $APPPATH && php artisan route:cache
    - cd $APPPATH && php artisan view:cache